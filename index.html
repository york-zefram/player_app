<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZEFRAM PLAYER NEO</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    
    <link href="https://fonts.googleapis.com/css2?family=Michroma:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-blue-glow: rgba(0, 242, 255, 0.7);
            --bg-black: #080808;
            --font-header: 'Michroma', sans-serif;
            --font-main: "A-OTF Gothic MB101 Pr5 R", sans-serif;
            --marker-size: 32px;
            --thumb-size: 32px; 
        }

        body {
            background-color: var(--bg-black);
            color: #fff;
            font-family: var(--font-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden;
            touch-action: none; 
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Loading & Overlay */
        #loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(8, 8, 8, 0.85);
            backdrop-filter: blur(5px);
            z-index: 1000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 4px solid rgba(0, 242, 255, 0.2);
            border-top: 4px solid var(--neon-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 15px var(--neon-blue-glow);
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #tap-to-start {
            display: none; color: var(--neon-blue); font-weight: bold;
            border: 2px solid var(--neon-blue); padding: 15px 30px; border-radius: 30px;
            box-shadow: 0 0 20px var(--neon-blue-glow); animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }

        /* Main UI */
        .player-wrapper {
            width: 100%; padding: calc(env(safe-area-inset-top) + 10px) 10px 10px 10px; 
            box-sizing: border-box; display: flex; flex-direction: column; gap: 6px;
        }

        header.glass-header { text-align: center; padding: 0 0 2px 0; }
        .app-title { 
            margin: 0; color: var(--neon-blue); font-family: var(--font-header);
            font-size: 0.85rem; letter-spacing: 1px; text-shadow: 0 0 10px var(--neon-blue-glow); 
            white-space: nowrap;
        }

        .info-header { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 5px 0; }
        .text-fields { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 4px; overflow: hidden; }
        .marquee-box { width: 100%; overflow: hidden; white-space: nowrap; text-align: center; min-height: 1.2em; }
        .marquee-inner { display: inline-block; white-space: nowrap; }
        .scrolling-content { display: inline-block; padding-right: 50px; animation: scroll-slow 15s linear infinite; }
        @keyframes scroll-slow { 0% { transform: translateX(0); } 10% { transform: translateX(0); } 85% { transform: translateX(-50%); } 100% { transform: translateX(-50%); } }
        
        #title-text { font-weight: bold; font-size: 1.0rem; line-height: 1.2; color: #fff; }
        .artist-row { display: flex; flex-direction: column; align-items: center; gap: 10px; width: 100%; }
        #artist-text { font-size: 0.8rem; color: var(--neon-blue); line-height: 1.2; }
        
        .btn-select { 
            width: 70%; height: 34px; border-radius: 17px; 
            border: 1px solid rgba(255, 255, 255, 0.15); background: rgba(255, 255, 255, 0.1);
            color: #fff; font-size: 0.8rem; font-weight: bold; line-height: 1; margin-top: 5px;
        }
        .btn-select:active { background: rgba(0, 242, 255, 0.2); border-color: var(--neon-blue); box-shadow: 0 0 20px var(--neon-blue-glow); }

        .status-action-row { 
            width: 100%; display: flex; justify-content: center; 
            margin-top: 5px; padding-top: 10px; border-top: 1px solid rgba(255, 255, 255, 0.1); 
        }
        .time-group { display: flex; flex-direction: column; align-items: center; gap: 4px; font-family: var(--font-header); }
        #time-display { color: #fff; font-size: 1.1rem; font-weight: bold; }
        #ab-range-text { color: var(--neon-blue); font-size: 0.9rem; font-weight: bold; }

        /* Seek Bar */
        section.container-2 { position: relative; height: 60px; display: flex; align-items: center; justify-content: center; }
        .seek-wrapper { position: relative; width: 87%; height: 6px; background: rgba(255, 255, 255, 0.1); border-radius: 3px; }
        .seek-bg-layer { position: absolute; top: 0; bottom: 0; background: var(--neon-blue); z-index: 1; border-radius: 3px; box-shadow: 0 0 15px var(--neon-blue-glow); }
        input[type="range"]#main-seek { -webkit-appearance: none; width: 100%; background: transparent; position: relative; z-index: 5; height: 40px; outline: none; margin: 0; }
        input[type="range"]#main-seek::-webkit-slider-thumb { -webkit-appearance: none; height: var(--thumb-size); width: var(--thumb-size); border-radius: 50%; background: #fff; box-shadow: 0 0 10px #fff, 0 0 30px var(--neon-blue-glow); }

        .marker { 
            position: absolute; width: var(--marker-size); height: var(--marker-size); border-radius: 50%; 
            background: rgba(50, 50, 50, 0.9); color: var(--neon-blue); font-size: 14px; font-family: var(--font-header);
            font-weight: bold; display: flex; justify-content: center; align-items: center; z-index: 20; 
            border: 2px solid var(--neon-blue); box-shadow: 0 0 15px var(--neon-blue-glow); top: 50%; transform: translate(-50%, -50%);
        }

        /* Controls */
        .container-3 { display: flex; justify-content: center; align-items: center; gap: 20px; min-height: 80px; }
        .main-btn { color: var(--neon-blue); background: transparent !important; border: 1px solid rgba(0, 242, 255, 0.3); transition: 0.3s; }
        .main-btn:active { transform: scale(0.95); background: rgba(0, 242, 255, 0.25) !important; box-shadow: 0 0 25px var(--neon-blue-glow); }
        .btn-large { width: 76px; height: 76px; border-radius: 50%; border: 2px solid var(--neon-blue); box-shadow: 0 0 15px var(--neon-blue-glow); }
        .btn-small { width: 48px; height: 48px; border-radius: 50%; border: 2px solid var(--neon-blue); }
        .btn-icon { font-size: 2.4rem; display: flex; align-items: center; justify-content: center; }
        .btn-icon-s { font-family: var(--font-header); font-weight: bold; }
        .svg-icon { width: 1em; height: 1em; fill: currentColor; }

        /* Tempo */
        .container-tempo { display: flex; flex-direction: column; gap: 12px; padding: 8px 10px; }
        .tempo-labels { display: flex; justify-content: space-between; color: var(--neon-blue); font-family: var(--font-header); font-size: 0.7rem; padding: 0 5%; }
        .tempo-slider-wrapper { position: relative; width: 88%; height: 40px; display: flex; align-items: center; margin: 0 auto; }
        .tempo-bg-layer { position: absolute; width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; z-index: 1; top: 50%; transform: translateY(-50%); }
        input[type="range"]#tempo-slider { -webkit-appearance: none; width: 100%; background: transparent; position: relative; z-index: 5; height: 50px; outline: none; }
        input[type="range"]#tempo-slider::-webkit-slider-thumb { -webkit-appearance: none; height: var(--thumb-size); width: var(--thumb-size); border-radius: 50%; background: #fff; box-shadow: 0 0 10px #fff, 0 0 30px var(--neon-blue-glow); }
        .tempo-controls { display: flex; justify-content: space-between; align-items: center; width: 90%; margin: 0 auto; }
        .btn-tempo { height: 30px; border-radius: 15px; font-family: var(--font-header); font-size: 0.75rem; border: 2px solid var(--neon-blue); color: var(--neon-blue); padding: 0 10px; }

        /* Folder Scan */
        .container-folder-scan { display: flex; justify-content: center; margin-top: 10px; }
        .btn-folder-scan { width: 90%; height: 34px; border-radius: 17px; border: 2px solid var(--neon-blue); background: rgba(0, 242, 255, 0.1); color: var(--neon-blue); font-family: var(--font-header); font-size: 0.8rem; letter-spacing: 2px; position: relative; }

        /* Playlist Overlay */
        #playlist-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-black); z-index: 9999; display: none; flex-direction: column; padding: calc(env(safe-area-inset-top) + 10px) 12px 12px 12px; box-sizing: border-box; }
        .playlist-header { display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid var(--neon-blue); padding-bottom: 8px; }
        #btn-close-list { background:none; border:1px solid var(--neon-blue); color:var(--neon-blue); border-radius:10px; padding:4px 12px; font-family: var(--font-header); font-size: 0.6rem; }
        .breadcrumb { font-size: 0.55rem; color: var(--neon-blue); margin: 8px 0; font-family: var(--font-header); }
        #track-list { flex: 1; overflow-y: auto; list-style: none; padding: 0; margin: 0; }
        .item { border-bottom: 1px solid #222; padding: 10px 0; display: flex; flex-direction: column; }
        .item.folder { color: var(--neon-blue); font-weight: bold; flex-direction: row; align-items: center; }
        .item-upper { display: flex; justify-content: space-between; align-items: center; }
        .track-name-part { font-size: 0.8rem; color: #fff; font-weight: bold; }
        .track-duration-part { color: #888; font-size: 0.6rem; font-family: var(--font-header); }
        .item-lower { color: var(--neon-blue); font-size: 0.6rem; margin-top: 2px; opacity: 0.7; }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="spinner" id="loading-spinner"></div>
    <div id="tap-to-start">READY</div>
</div>

<div class="player-wrapper">
    <header class="glass-header"><h1 class="app-title">ZEFRAM PLAYER NEO</h1></header>

    <section class="info-header">
        <div class="text-fields">
            <div class="marquee-box" id="title-box"><div id="title-inner" class="marquee-inner"><span id="title-text">SELECT TRACK</span></div></div>
            <div class="artist-row">
                <div class="marquee-box" id="artist-box"><div id="artist-inner" class="marquee-inner"><span id="artist-text">UNKNOWN ARTIST</span></div></div>
                <button class="btn-select" id="btn-select-file">選 曲</button>
            </div>
        </div>
        <div class="status-action-row">
            <div class="time-group">
                <div id="time-display">00:00 / 00:00</div>
                <div id="ab-range-text">00:00 ▶ 00:00</div>
            </div>
        </div>
    </section>

    <section class="container-2">
        <div class="seek-wrapper" id="seek-wrapper">
            <div class="seek-bg-layer" id="seek-bg"></div>
            <input type="range" id="main-seek" min="0" max="100" value="0" step="0.1">
            <div class="marker" id="marker-a">A</div>
            <div class="marker" id="marker-b">B</div>
        </div>
    </section>

    <section class="container-3">
        <button class="main-btn btn-small" id="btn-set-a"><span class="btn-icon-s">A</span></button>
        <button class="main-btn btn-large" id="btn-back-to-a"><span class="btn-icon"><svg class="svg-icon" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></span></button>
        <button class="main-btn btn-large" id="btn-play"><span class="btn-icon" id="play-icon"><svg class="svg-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></span></button>
        <button class="main-btn btn-small" id="btn-set-b"><span class="btn-icon-s">B</span></button>
    </section>

    <section class="container-tempo">
        <div class="tempo-labels"><span>-50%</span> <span>0%</span> <span>+50%</span></div>
        <div class="tempo-slider-wrapper">
            <div class="tempo-bg-layer"></div>
            <input type="range" id="tempo-slider" min="50" max="150" step="1" value="100">
        </div>
        <div class="tempo-controls">
            <button class="main-btn btn-tempo" id="tempo-minus">－</button>
            <button class="main-btn btn-tempo" id="tempo-reset">RESET</button>
            <button class="main-btn btn-tempo" id="tempo-plus">＋</button>
        </div>
    </section>

    <section class="container-folder-scan">
        <button class="btn-folder-scan" id="btn-folder-scan">
            FOLDER SCAN
            <input type="file" id="folder-input" webkitdirectory directory multiple style="position:absolute; top:0; left:0; width:100%; height:100%; opacity:0;">
        </button>
    </section>
</div>

<div id="playlist-overlay">
    <div class="playlist-header">
        <span style="color:var(--neon-blue); font-family:var(--font-header); font-size:0.6rem;">MUSIC PLAYLIST</span>
        <button id="btn-close-list">CLOSE</button>
    </div>
    <div id="breadcrumb" class="breadcrumb">ROOT /</div>
    <ul id="track-list"></ul>
</div>

<audio id="audio" preload="auto"></audio>

<script>
    const audio = document.getElementById('audio');
    const seek = document.getElementById('main-seek');
    const seekBg = document.getElementById('seek-bg');
    const markerA = document.getElementById('marker-a');
    const markerB = document.getElementById('marker-b');
    const tempoSlider = document.getElementById('tempo-slider');
    const playIcon = document.getElementById('play-icon');
    const loadingOverlay = document.getElementById('loading-overlay');
    const loadingSpinner = document.getElementById('loading-spinner');
    const tapToStart = document.getElementById('tap-to-start');
    
    const ICON_PLAY = '<svg class="svg-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
    const ICON_PAUSE = '<svg class="svg-icon" viewBox="0 0 24 24"><path d="M6.5 19h4V5h-4v14zm9 0h4V5h-4v14z"/></svg>';
    
    let posA = 0; let posB = 100;
    let isDragging = false;
    let allFiles = [];
    let currentPath = [];

    // --- FOLDER & PATH LOGIC ---
    const overlay = document.getElementById('playlist-overlay');
    const folderInput = document.getElementById('folder-input');
    const trackList = document.getElementById('track-list');

    document.getElementById('btn-select-file').onclick = () => {
        if (allFiles.length === 0) { alert("SCAN FOLDER FIRST"); return; }
        overlay.style.display = 'flex';
    };
    document.getElementById('btn-close-list').onclick = () => overlay.style.display = 'none';

    folderInput.onchange = (e) => {
        const files = Array.from(e.target.files);
        allFiles = files.filter(f => f.name.match(/\.(mp3|m4a|wav|aac)$/i)).map(f => {
            // Android/Firefoxのパス差分を正規化
            let rawPath = f.webkitRelativePath || f.name;
            let parts = rawPath.split('/').filter(p => p.length > 0);
            return { name: f.name, path: parts, file: f };
        });
        currentPath = [];
        renderList();
        overlay.style.display = 'flex';
    };

    function renderList() {
        trackList.innerHTML = '';
        document.getElementById('breadcrumb').innerText = "ROOT / " + currentPath.join(' / ').toUpperCase();
        
        if (currentPath.length > 0) {
            const up = document.createElement('li');
            up.className = 'item folder';
            up.innerText = "📁 .. BACK";
            up.onclick = () => { currentPath.pop(); renderList(); };
            trackList.appendChild(up);
        }

        const dirs = new Set();
        const files = [];

        allFiles.forEach(f => {
            const isMatch = currentPath.every((p, i) => f.path[i] === p);
            if (isMatch) {
                const nextPart = f.path[currentPath.length];
                if (f.path.length === currentPath.length + 1) {
                    files.push(f);
                } else if (nextPart) {
                    dirs.add(nextPart);
                }
            }
        });

        Array.from(dirs).sort().forEach(d => {
            const li = document.createElement('li');
            li.className = 'item folder';
            li.innerText = "📁 " + d.toUpperCase();
            li.onclick = () => { currentPath.push(d); renderList(); };
            trackList.appendChild(li);
        });

        files.forEach(f => {
            const li = document.createElement('li');
            li.className = 'item track';
            const id = `f-${f.file.size}-${f.file.lastModified}`;
            li.innerHTML = `
                <div class="item-upper">
                    <span class="track-name-part">${f.name}</span>
                    <span class="track-duration-part" id="dur-${id}">--:--</span>
                </div>
                <div class="item-lower" id="art-${id}">UNKNOWN ARTIST</div>
            `;
            li.onclick = () => { loadTrack(f.file); overlay.style.display = 'none'; };
            trackList.appendChild(li);

            // Metadata
            const url = URL.createObjectURL(f.file);
            const tA = new Audio(url);
            tA.onloadedmetadata = () => {
                document.getElementById(`dur-${id}`).innerText = formatTime(tA.duration);
                URL.revokeObjectURL(url);
            };
            if (window.jsmediatags) {
                window.jsmediatags.read(f.file, {
                    onSuccess: (tag) => {
                        const artist = tag.tags.artist || "UNKNOWN ARTIST";
                        document.getElementById(`art-${id}`).innerText = artist.toUpperCase();
                    }
                });
            }
        });
    }

    function loadTrack(file) {
        loadingOverlay.style.display = 'flex';
        loadingSpinner.style.display = 'block';
        tapToStart.style.display = 'none';
        
        audio.pause();
        const url = URL.createObjectURL(file);
        audio.src = url;
        posA = 0; posB = 100;
        audio.currentTime = 0;
        
        audio.onloadeddata = () => {
            loadingSpinner.style.display = 'none';
            tapToStart.style.display = 'block';
            window.jsmediatags.read(file, {
                onSuccess: (tag) => {
                    document.getElementById('title-text').innerText = tag.tags.title || file.name;
                    document.getElementById('artist-text').innerText = tag.tags.artist || "UNKNOWN ARTIST";
                    checkMarquee('title-inner', 'title-box');
                    checkMarquee('artist-inner', 'artist-box');
                },
                onError: () => {
                    document.getElementById('title-text').innerText = file.name;
                    document.getElementById('artist-text').innerText = "UNKNOWN ARTIST";
                }
            });
            updateSeekStyle();
        };
    }

    // --- CORE PLAYER LOGIC ---
    tapToStart.onclick = () => {
        loadingOverlay.style.display = 'none';
        audio.play();
        playIcon.innerHTML = ICON_PAUSE;
    };

    function updateFrame() {
        if (audio.duration && !isDragging) {
            const curP = (audio.currentTime / audio.duration) * 100;
            if (curP >= posB || curP < posA - 0.1) {
                audio.currentTime = (posA / 100) * audio.duration;
            }
            seek.value = curP;
            document.getElementById('time-display').innerText = `${formatTime(audio.currentTime)} / ${formatTime(audio.duration)}`;
            updateSeekStyle();
        }
        requestAnimationFrame(updateFrame);
    }
    requestAnimationFrame(updateFrame);

    function formatTime(s) {
        if (isNaN(s)) return "00:00";
        const m = Math.floor(s / 60);
        const sec = Math.floor(s % 60);
        return `${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
    }

    function updateSeekStyle() {
        const rect = document.getElementById('seek-wrapper').clientWidth;
        const xA = (posA / 100) * rect;
        const xB = (posB / 100) * rect;
        markerA.style.left = `${xA}px`;
        markerB.style.left = `${xB}px`;
        seekBg.style.left = `${xA}px`;
        seekBg.style.width = `${xB - xA}px`;
        if (audio.duration) {
            document.getElementById('ab-range-text').innerText = `${formatTime((posA/100)*audio.duration)} ▶ ${formatTime((posB/100)*audio.duration)}`;
        }
    }

    // Controls
    document.getElementById('btn-play').onclick = () => {
        if (audio.paused) { audio.play(); playIcon.innerHTML = ICON_PAUSE; }
        else { audio.pause(); playIcon.innerHTML = ICON_PLAY; }
    };

    document.getElementById('btn-set-a').onclick = () => {
        posA = (audio.currentTime / audio.duration) * 100;
        if (posA >= posB) posA = posB - 1;
        updateSeekStyle();
    };
    document.getElementById('btn-set-b').onclick = () => {
        posB = (audio.currentTime / audio.duration) * 100;
        if (posB <= posA) posB = posA + 1;
        updateSeekStyle();
    };
    document.getElementById('btn-back-to-a').onclick = () => {
        audio.currentTime = (posA / 100) * audio.duration;
        audio.play();
        playIcon.innerHTML = ICON_PAUSE;
    };

    // Tempo
    function updateTempo(v) {
        const val = Math.max(50, Math.min(150, v));
        tempoSlider.value = val;
        audio.playbackRate = val / 100;
    }
    tempoSlider.oninput = (e) => audio.playbackRate = e.target.value / 100;
    document.getElementById('tempo-reset').onclick = () => updateTempo(100);
    document.getElementById('tempo-minus').onclick = () => updateTempo(parseInt(tempoSlider.value) - 1);
    document.getElementById('tempo-plus').onclick = () => updateTempo(parseInt(tempoSlider.value) + 1);

    // Draggable Markers
    function setupDrag(el, isA) {
        let dragging = false;
        const move = (e) => {
            if (!dragging) return;
            isDragging = true;
            const rect = document.getElementById('seek-wrapper').getBoundingClientRect();
            const x = (e.touches ? e.touches[0].clientX : e.clientX);
            let val = ((x - rect.left) / rect.width) * 100;
            val = Math.max(0, Math.min(100, val));
            if (isA) posA = Math.min(val, posB - 1);
            else posB = Math.max(val, posA + 1);
            updateSeekStyle();
        };
        el.addEventListener('mousedown', () => dragging = true);
        el.addEventListener('touchstart', (e) => { e.preventDefault(); dragging = true; });
        window.addEventListener('mousemove', move);
        window.addEventListener('touchmove', move, {passive:false});
        window.addEventListener('mouseup', () => { dragging = false; isDragging = false; });
        window.addEventListener('touchend', () => { dragging = false; isDragging = false; });
    }
    setupDrag(markerA, true);
    setupDrag(markerB, false);

    function checkMarquee(innerId, boxId) {
        const inner = document.getElementById(innerId);
        const box = document.getElementById(boxId);
        inner.classList.remove('scrolling-content');
        if (inner.scrollWidth > box.clientWidth) {
            const span = inner.querySelector('span');
            if (!inner.querySelector('.marquee-clone')) {
                const clone = span.cloneNode(true);
                clone.classList.add('marquee-clone');
                inner.appendChild(clone);
            }
            inner.classList.add('scrolling-content');
        }
    }

    window.onresize = updateSeekStyle;
    window.onload = updateSeekStyle;
</script>
</body>
</html>
