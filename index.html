<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZEFRAM PLAYER NEO - UNIFIED LIST</title>
    <link href="https://fonts.googleapis.com/css2?family=Michroma:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <style>
        :root { --neon-blue: #00f2ff; --bg-black: #080808; --font-header: 'Michroma', sans-serif; }
        body { background: var(--bg-black); color: #fff; margin: 0; font-family: sans-serif; overflow: hidden; }
        
        .player-wrapper { width: 100vw; height: 100vh; display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; justify-content: space-between; }
        
        .btn-scan-main { 
            position: relative; width: 100%; height: 34px; border: 1px solid var(--neon-blue);
            background: transparent; color: var(--neon-blue); font-family: var(--font-header);
            font-size: 11px; letter-spacing: 2px; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .btn-scan-main input { position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; display: none; flex-direction: column; }
        .list-header { padding: 20px 15px 10px; border-bottom: 1px solid #333; }
        .breadcrumb { font-family: var(--font-header); font-size: 10px; color: var(--neon-blue); margin-bottom: 10px; text-transform: uppercase; }
        .track-list { flex: 1; overflow-y: auto; list-style: none; margin: 0; padding: 0; }
        
        .item { padding: 15px; border-bottom: 1px solid #1a1a1a; cursor: pointer; }
        .item:active { background: #111; }
        .item.folder { color: var(--neon-blue); font-weight: bold; font-family: var(--font-header); font-size: 12px; }
        
        .item-upper { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
        .track-name-part { font-size: 14px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; margin-right: 10px; }
        .track-duration-part { font-family: var(--font-header); font-size: 10px; color: #666; }
        .item-lower { font-size: 10px; color: #888; letter-spacing: 0.5px; }

        #title-text { font-family: var(--font-header); text-align: center; font-size: 14px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="player-wrapper">
    <div id="title-text">NO TRACK SELECTED</div>
    
    <div class="btn-scan-main">
        選 曲
        <input type="file" id="folder-input" webkitdirectory directory multiple>
    </div>
</div>

<div class="overlay" id="overlay">
    <div class="list-header">
        <div class="breadcrumb" id="breadcrumb">ROOT</div>
    </div>
    <ul class="track-list" id="track-list"></ul>
</div>

<audio id="audio-player"></audio>

<script>
    const folderInput = document.getElementById('folder-input');
    const overlay = document.getElementById('overlay');
    const trackList = document.getElementById('track-list');
    const breadcrumb = document.getElementById('breadcrumb');
    const audio = document.getElementById('audio-player');

    let allFiles = [];
    let currentPath = [];

    folderInput.onchange = (e) => {
        const files = Array.from(e.target.files);
        allFiles = files.filter(f => f.type.startsWith('audio/') || /\.(mp3|m4a|wav)$/i.test(f.name)).map(f => {
            const parts = f.webkitRelativePath.split('/');
            parts.shift(); // 親フォルダ名を削除して正規化
            return { name: f.name, path: parts, file: f };
        });
        currentPath = [];
        renderList();
        overlay.style.display = 'flex';
    };

    function renderList() {
        trackList.innerHTML = '';
        breadcrumb.innerText = "ROOT / " + currentPath.join(' / ').toUpperCase();
        
        if (currentPath.length > 0) {
            const up = document.createElement('li'); 
            up.className = 'item folder'; 
            up.innerText = `.. (BACK)`;
            up.onclick = () => { currentPath.pop(); renderList(); }; 
            trackList.appendChild(up);
        }

        const dirs = new Set(); 
        const filesInLevel = [];

        allFiles.forEach(f => {
            const isMatch = currentPath.every((p, i) => f.path[i] === p);
            if (isMatch) {
                const nextPart = f.path[currentPath.length];
                if (f.path.length === currentPath.length + 1) {
                    filesInLevel.push(f);
                } else if (nextPart) {
                    dirs.add(nextPart);
                }
            }
        });

        Array.from(dirs).sort().forEach(d => {
            const li = document.createElement('li'); 
            li.className = 'item folder'; 
            li.innerText = `📁 ${d.toUpperCase()}`;
            li.onclick = () => { currentPath.push(d); renderList(); }; 
            trackList.appendChild(li);
        });

        filesInLevel.forEach(f => {
            const li = document.createElement('li'); 
            li.className = 'item track';
            const uniqueId = `idx-${f.file.lastModified}-${f.file.size}`;
            li.innerHTML = `
                <div class="item-upper">
                    <span class="track-name-part">${f.name}</span>
                    <span class="track-duration-part" id="dur-${uniqueId}">--:--</span>
                </div>
                <div class="item-lower" id="meta-${uniqueId}">UNKNOWN ARTIST</div>`;
            
            li.onclick = () => {
                const url = URL.createObjectURL(f.file);
                audio.src = url;
                audio.play();
                document.getElementById('title-text').innerText = f.name;
                overlay.style.display = 'none';
            };
            trackList.appendChild(li);

            // メタデータ取得
            const url = URL.createObjectURL(f.file);
            const tempAudio = new Audio(url);
            tempAudio.onloadedmetadata = () => {
                const durEl = document.getElementById(`dur-${uniqueId}`);
                if (durEl) {
                    const m = Math.floor(tempAudio.duration / 60);
                    const s = Math.floor(tempAudio.duration % 60).toString().padStart(2, '0');
                    durEl.innerText = `${m}:${s}`;
                }
                URL.revokeObjectURL(url);
            };
            if (window.jsmediatags) {
                window.jsmediatags.read(f.file, {
                    onSuccess: (tag) => {
                        const artist = (tag.tags.artist || "UNKNOWN ARTIST").toUpperCase();
                        const metaEl = document.getElementById(`meta-${uniqueId}`);
                        if (metaEl) metaEl.innerText = artist;
                    }
                });
            }
        });
    }
</script>
</body>
</html>
